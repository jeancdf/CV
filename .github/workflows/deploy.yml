name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jeancdf/cv-de-jean:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
      SMTP_SECURE: ${{ vars.SMTP_SECURE || 'true' }}
      SMTP_USER: ${{ vars.SMTP_USER || 'jeancdfpro@gmail.com' }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ vars.MAIL_FROM || 'Jean Cazals <jeancdfpro@gmail.com>' }}
      CONTACT_TO_EMAIL: ${{ vars.CONTACT_TO_EMAIL || 'jeancdfpro@gmail.com' }}
      PORT: '80'
      TRUST_PROXY: 'true'
    steps:
      - name: Validate mailing secret
        run: |
          if [ -z "$SMTP_PASS" ]; then
            echo "SMTP_PASS is missing. Add it in Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

      - name: SSH to VPS and redeploy
        uses: appleboy/ssh-action@v1
        env:
          SMTP_HOST: ${{ env.SMTP_HOST }}
          SMTP_PORT: ${{ env.SMTP_PORT }}
          SMTP_SECURE: ${{ env.SMTP_SECURE }}
          SMTP_USER: ${{ env.SMTP_USER }}
          SMTP_PASS: ${{ env.SMTP_PASS }}
          MAIL_FROM: ${{ env.MAIL_FROM }}
          CONTACT_TO_EMAIL: ${{ env.CONTACT_TO_EMAIL }}
          PORT: ${{ env.PORT }}
          TRUST_PROXY: ${{ env.TRUST_PROXY }}
        with:
          host: cv-de-jean.duckdns.org
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_USER,SMTP_PASS,MAIL_FROM,CONTACT_TO_EMAIL,PORT,TRUST_PROXY
          script: |
            set -eu

            DEPLOY_DIR="$HOME/cv-de-jean"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.prod.yml"
            COMPOSE_MAIL_FILE="$DEPLOY_DIR/docker-compose.mail.yml"
            MAIL_ENV_FILE="$DEPLOY_DIR/mailing.env"
            APP_IMAGE="ghcr.io/jeancdf/cv-de-jean:latest"

            umask 077
            MAIL_ENV_TEMP=$(mktemp "$DEPLOY_DIR/.mailing.env.XXXXXX")
            COMPOSE_MAIL_TEMP=$(mktemp "$DEPLOY_DIR/.docker-compose.mail.XXXXXX")

            trap 'rm -f "$MAIL_ENV_TEMP" "$COMPOSE_MAIL_TEMP"' EXIT

            docker pull "$APP_IMAGE"

            CV_SERVICE=$(
              docker compose -f "$COMPOSE_FILE" config --format json |
                docker run --rm -i "$APP_IMAGE" node -e '
                  const fs = require("node:fs");
                  const config = JSON.parse(fs.readFileSync(0, "utf8"));
                  const matches = Object.entries(config.services || {}).filter(([, service]) =>
                    /^ghcr\.io\/jeancdf\/cv-de-jean(?::|@|$)/.test(service.image || ""),
                  );

                  if (matches.length !== 1) {
                    process.stderr.write(`Expected one CV service, found ${matches.length}.\n`);
                    process.exit(1);
                  }

                  process.stdout.write(matches[0][0]);
                '
            )

            {
              printf 'SMTP_HOST=%s\n' "$SMTP_HOST"
              printf 'SMTP_PORT=%s\n' "$SMTP_PORT"
              printf 'SMTP_SECURE=%s\n' "$SMTP_SECURE"
              printf 'SMTP_USER=%s\n' "$SMTP_USER"
              printf 'SMTP_PASS=%s\n' "$SMTP_PASS"
              printf 'MAIL_FROM=%s\n' "$MAIL_FROM"
              printf 'CONTACT_TO_EMAIL=%s\n' "$CONTACT_TO_EMAIL"
              printf 'PORT=%s\n' "$PORT"
              printf 'TRUST_PROXY=%s\n' "$TRUST_PROXY"
            } > "$MAIL_ENV_TEMP"

            {
              printf 'services:\n'
              printf '  "%s":\n' "$CV_SERVICE"
              printf '    env_file:\n'
              printf '      - mailing.env\n'
            } > "$COMPOSE_MAIL_TEMP"

            mv "$MAIL_ENV_TEMP" "$MAIL_ENV_FILE"
            mv "$COMPOSE_MAIL_TEMP" "$COMPOSE_MAIL_FILE"
            trap - EXIT

            docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_MAIL_FILE" config --quiet

            docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_MAIL_FILE" pull
            docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_MAIL_FILE" up -d --remove-orphans

            CV_CONTAINER=$(docker compose -f "$COMPOSE_FILE" -f "$COMPOSE_MAIL_FILE" ps -q "$CV_SERVICE")
            if [ -z "$CV_CONTAINER" ]; then
              echo "The CV container did not start."
              exit 1
            fi

            if ! docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$CV_CONTAINER" | grep -q '^SMTP_PASS='; then
              echo "The mailing configuration was not injected into the CV container."
              exit 1
            fi
